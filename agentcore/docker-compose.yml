services:
  # ── Search & Scraping Services ─────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: agentcore-searxng
    environment:
      SEARXNG_BASE_URL: http://localhost:8888
    volumes:
      - ./searxng:/etc/searxng:rw
    ports:
      - "8888:8080"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/search?q=test&format=json || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agentcore-net

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: agentcore-crawl4ai
    ports:
      - "11235:11235"
    environment:
      MAX_CONCURRENT_TASKS: 5
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11235/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - agentcore-net

  # ── Data Services ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agentcore-postgres
    environment:
      POSTGRES_USER: agentcore
      POSTGRES_PASSWORD: agentcore
      POSTGRES_DB: agentcore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentcore-net

  redis:
    image: redis:7-alpine
    container_name: agentcore-redis
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentcore-net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: agentcore-pgbouncer
    environment:
      DATABASE_URL: postgres://agentcore:agentcore@postgres:5432/agentcore
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentcore-net

  # ── Application Services ────────────────────────────────────────────────────
  agentcore-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentcore-api
    command: node dist/index.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agentcore:agentcore@pgbouncer:6432/agentcore
      REDIS_URL: redis://redis:6379
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_URL: http://crawl4ai:11235
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      searxng:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - agentcore-net

  agentcore-workers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentcore-workers
    command: node dist/queues/workers.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agentcore:agentcore@pgbouncer:6432/agentcore
      REDIS_URL: redis://redis:6379
      SEARXNG_URL: http://searxng:8080
      CRAWL4AI_URL: http://crawl4ai:11235
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      searxng:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
    networks:
      - agentcore-net

  agentcore-dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
        NEXT_PUBLIC_WS_URL: ws://localhost:4000/ws/realtime
    container_name: agentcore-dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://agentcore-api:4000/api
      NEXT_PUBLIC_WS_URL: ws://agentcore-api:4000/ws/realtime
    ports:
      - "3000:3000"
    depends_on:
      agentcore-api:
        condition: service_healthy
    networks:
      - agentcore-net

volumes:
  pgdata:
  redisdata:

networks:
  agentcore-net:
    driver: bridge
