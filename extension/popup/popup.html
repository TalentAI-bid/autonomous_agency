<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>TalentAI Scraper</title>
  </head>
  <body>
    <header>
      <h1>TalentAI</h1>
      <span id="status-badge" class="badge idle">idle</span>
    </header>

    <!-- ─── Signed-out state ─────────────────────────────────────────── -->
    <section id="signin-section" hidden>
      <h2>Sign in</h2>
      <label>
        Server URL
        <input id="server-url" type="text" placeholder="http://localhost:3000" />
      </label>
      <label>
        Email
        <input id="email" type="text" placeholder="you@example.com" autocomplete="username" />
      </label>
      <label>
        Password
        <input id="password" type="password" autocomplete="current-password" />
      </label>
      <div id="signin-error" class="error" hidden></div>
      <div class="row">
        <button id="signin-btn" class="primary">Sign in</button>
      </div>
      <p class="muted footnote">
        Use your TalentAI dashboard credentials. The extension issues its own
        connection key automatically.
      </p>
    </section>

    <!-- ─── Signed-in state ──────────────────────────────────────────── -->
    <section id="account-section" hidden>
      <h2>Account</h2>
      <div id="user-line" class="user-line"></div>
      <div class="row">
        <button id="signout-btn" class="danger">Sign out</button>
      </div>
    </section>

    <section id="task-section" hidden>
      <h2>Current task</h2>
      <div id="agent-line" class="muted small" hidden></div>
      <div id="current-task" class="muted">Waiting for work…</div>
      <div class="row">
        <button id="pause-btn" class="secondary">Pause</button>
        <button id="resume-btn" class="secondary" hidden>Resume</button>
      </div>
    </section>

    <section id="usage-section" hidden>
      <h2>Today's usage</h2>
      <table id="usage-table">
        <thead>
          <tr><th>Site</th><th>Type</th><th>Used / Cap</th></tr>
        </thead>
        <tbody id="usage-body"></tbody>
      </table>
    </section>

    <footer>
      <span class="muted">Scrapes only when your browser is open and signed into the source sites.</span>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
