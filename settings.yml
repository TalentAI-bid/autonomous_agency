use_default_settings: true

server:
  secret_key: "changethiskeytosomethingrandom123456"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  default_lang: "en"

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: brave
    engine: brave
    shortcut: br
    disabled: false
  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false
  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: true
